name: build-halo

# Staged build for the droste *-halo (gfx1151 / Strix Halo) image set.
#   base/        → droste-runtime-base-halo, droste-build-base-halo
#   scaffolding/ → droste-<app>-build-halo   (FROM scratch carriers)
#   targets/     → droste-<app>-halo         (shippable runtimes + comfyui)
# Images push to GHCR as ghcr.io/<owner>/droste-<name>-halo.
# Image names follow the Containerfile ARG scheme ${SERIES_NAME}-${TARGET_NAME}-${ARCH_NAME}.

on:
  push:
    branches: [main]
    paths:
      - 'base/**'
      - 'scaffolding/**'
      - '!scaffolding/check-rocm.sh'
      - '!scaffolding/_fedora-src/**'
      - 'targets/**'
      - 'ci/**'
      - 'rocm-version.env'
      - '.github/workflows/build-halo.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/droste-<name>-halo
  NS: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: build-halo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Load pin
        run: |
          set -a; . ./rocm-version.env; set +a
          for k in GFX_TARGET ROCM_INDEX_URL ROCM_PIN TORCH_VERSION TORCHVISION_VERSION TORCHAUDIO_VERSION ROCM_SDK_DEVEL_VERSION ROCM_SDK_LIBRARIES_VERSION; do
            printf '%s=%s\n' "$k" "${!k}" >> "$GITHUB_ENV"
          done
      - uses: docker/setup-buildx-action@v3
      - name: Build & push droste-runtime-base-halo
        uses: docker/build-push-action@v6
        with:
          context: ci/empty
          file: base/Container.runtime
          push: true
          tags: |
            ${{ env.NS }}/droste-runtime-base-halo:${{ github.sha }}
            ${{ env.NS }}/droste-runtime-base-halo:latest
          build-args: |
            ROCM_INDEX_URL=${{ env.ROCM_INDEX_URL }}
            ROCM_SDK_LIBRARIES_VERSION=${{ env.ROCM_SDK_LIBRARIES_VERSION }}
            GFX_TARGET=${{ env.GFX_TARGET }}
          cache-from: type=registry,ref=${{ env.NS }}/droste-runtime-base-halo:buildcache
          cache-to: type=registry,ref=${{ env.NS }}/droste-runtime-base-halo:buildcache,mode=max

  build-base:
    needs: runtime-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Load pin
        run: |
          set -a; . ./rocm-version.env; set +a
          for k in GFX_TARGET ROCM_INDEX_URL ROCM_PIN TORCH_VERSION TORCHVISION_VERSION TORCHAUDIO_VERSION ROCM_SDK_DEVEL_VERSION ROCM_SDK_LIBRARIES_VERSION; do
            printf '%s=%s\n' "$k" "${!k}" >> "$GITHUB_ENV"
          done
      - uses: docker/setup-buildx-action@v3
      - name: Build & push droste-build-base-halo
        uses: docker/build-push-action@v6
        with:
          context: ci/empty
          file: base/Container.build
          push: true
          tags: |
            ${{ env.NS }}/droste-build-base-halo:${{ github.sha }}
            ${{ env.NS }}/droste-build-base-halo:latest
          build-args: |
            BASE_IMAGE=${{ env.NS }}/droste-runtime-base-halo:${{ github.sha }}
            ROCM_INDEX_URL=${{ env.ROCM_INDEX_URL }}
            ROCM_SDK_DEVEL_VERSION=${{ env.ROCM_SDK_DEVEL_VERSION }}
            GFX_TARGET=${{ env.GFX_TARGET }}
          cache-from: type=registry,ref=${{ env.NS }}/droste-build-base-halo:buildcache
          cache-to: type=registry,ref=${{ env.NS }}/droste-build-base-halo:buildcache,mode=max

  torch-base:
    needs: runtime-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Load pin
        run: |
          set -a; . ./rocm-version.env; set +a
          for k in GFX_TARGET ROCM_INDEX_URL ROCM_PIN TORCH_VERSION TORCHVISION_VERSION TORCHAUDIO_VERSION ROCM_SDK_DEVEL_VERSION ROCM_SDK_LIBRARIES_VERSION; do
            printf '%s=%s\n' "$k" "${!k}" >> "$GITHUB_ENV"
          done
      - uses: docker/setup-buildx-action@v3
      - name: Build & push droste-torch-base-halo
        uses: docker/build-push-action@v6
        with:
          context: ci/empty
          file: base/Container.torch
          push: true
          tags: |
            ${{ env.NS }}/droste-torch-base-halo:${{ github.sha }}
            ${{ env.NS }}/droste-torch-base-halo:latest
          build-args: |
            BASE_IMAGE=${{ env.NS }}/droste-runtime-base-halo:${{ github.sha }}
            ROCM_INDEX_URL=${{ env.ROCM_INDEX_URL }}
            TORCH_VERSION=${{ env.TORCH_VERSION }}
          cache-from: type=registry,ref=${{ env.NS }}/droste-torch-base-halo:buildcache
          cache-to: type=registry,ref=${{ env.NS }}/droste-torch-base-halo:buildcache,mode=max

  hip-probe:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: HIP gfx1151 compile probe (the go/no-go)
        run: |
          docker run --rm "${NS}/droste-build-base-halo:${GITHUB_SHA}" bash -lc '
            set -euo pipefail
            echo "== which hipcc / amdclang++ =="
            command -v hipcc && command -v amdclang++
            echo "== rocm-sdk path =="
            rocm-sdk path --root && rocm-sdk path --cmake

            echo "== hipcc device compile for gfx1151 =="
            cat > /tmp/k.hip <<EOF
          #include <hip/hip_runtime.h>
          __global__ void add1(float* a){ a[threadIdx.x] += 1.0f; }
          int main(){ return 0; }
          EOF
            hipcc --offload-arch=gfx1151 /tmp/k.hip -o /tmp/k
            echo "HIPCC gfx1151 device compile: OK"

            echo "== cmake find_package(hip) =="
            mkdir -p /tmp/cm && cd /tmp/cm
            cat > CMakeLists.txt <<EOF
          cmake_minimum_required(VERSION 3.21)
          project(probe LANGUAGES CXX)
          find_package(hip REQUIRED)
          message(STATUS "hip FOUND version=\${hip_VERSION}")
          EOF
            cmake -B build -DCMAKE_PREFIX_PATH="/opt/rocm" . >/dev/null
            echo "find_package(hip): OK"
            echo "=== CORE BET VALIDATED: pip rocm-sdk-devel compiles HIP for gfx1151 ==="
          '

  # ── Ports, phase 2 ────────────────────────────────────────────────────────
  # One job per port: build+push the artifacts carrier (heavy compiles against
  # build-base), then build+push the runtime (FROM runtime-base + COPY --from the
  # just-pushed artifacts). fail-fast:false so one port never skips another.
  # art_ctx / rt_ctx name each stage's build context: ci/empty for asset-less
  # images, the asset dir for ones that COPY local files.
  port:
    needs: [build-base, torch-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: ds4,        art_ctx: ci/empty,                    rt_ctx: ci/empty,            rt_base: runtime-base }
          - { name: llama,      art_ctx: scaffolding/llama-artifacts, rt_ctx: ci/empty,            rt_base: runtime-base }
          - { name: vllm,       art_ctx: scaffolding/vllm-artifacts,  rt_ctx: targets/vllm,        rt_base: torch-base }
          - { name: finetuning, art_ctx: ci/empty,                    rt_ctx: targets/finetuning,  rt_base: torch-base }
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Load pin
        run: |
          set -a; . ./rocm-version.env; set +a
          for k in GFX_TARGET ROCM_INDEX_URL ROCM_PIN TORCH_VERSION TORCHVISION_VERSION TORCHAUDIO_VERSION ROCM_SDK_DEVEL_VERSION ROCM_SDK_LIBRARIES_VERSION; do
            printf '%s=%s\n' "$k" "${!k}" >> "$GITHUB_ENV"
          done
      - uses: docker/setup-buildx-action@v3
      - name: Build & push droste-${{ matrix.name }}-build-halo
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.art_ctx }}
          file: scaffolding/Container.${{ matrix.name }}-build
          push: true
          tags: |
            ${{ env.NS }}/droste-${{ matrix.name }}-build-halo:${{ github.sha }}
            ${{ env.NS }}/droste-${{ matrix.name }}-build-halo:latest
          build-args: |
            BASE_IMAGE=${{ env.NS }}/droste-build-base-halo:${{ github.sha }}
            ROCM_INDEX_URL=${{ env.ROCM_INDEX_URL }}
            TORCH_VERSION=${{ env.TORCH_VERSION }}
            GFX_TARGET=${{ env.GFX_TARGET }}
          cache-from: type=registry,ref=${{ env.NS }}/droste-${{ matrix.name }}-build-halo:buildcache
          cache-to: type=registry,ref=${{ env.NS }}/droste-${{ matrix.name }}-build-halo:buildcache,mode=max
      - name: Build & push droste-${{ matrix.name }}-halo
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.rt_ctx }}
          file: targets/Container.${{ matrix.name }}
          push: true
          tags: |
            ${{ env.NS }}/droste-${{ matrix.name }}-halo:${{ github.sha }}
            ${{ env.NS }}/droste-${{ matrix.name }}-halo:latest
          build-args: |
            BASE_IMAGE=${{ env.NS }}/droste-${{ matrix.rt_base }}-halo:${{ github.sha }}
            ARTIFACTS_IMAGE=${{ env.NS }}/droste-${{ matrix.name }}-build-halo:${{ github.sha }}
            ROCM_INDEX_URL=${{ env.ROCM_INDEX_URL }}
            TORCH_VERSION=${{ env.TORCH_VERSION }}
            GFX_TARGET=${{ env.GFX_TARGET }}
          cache-from: type=registry,ref=${{ env.NS }}/droste-${{ matrix.name }}-halo:buildcache
          cache-to: type=registry,ref=${{ env.NS }}/droste-${{ matrix.name }}-halo:buildcache,mode=max

  # comfyui: single interactive image (no compile; torch wheels + pip). FROM torch-base.
  comfyui:
    needs: torch-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Load pin
        run: |
          set -a; . ./rocm-version.env; set +a
          for k in GFX_TARGET ROCM_INDEX_URL ROCM_PIN TORCH_VERSION TORCHVISION_VERSION TORCHAUDIO_VERSION ROCM_SDK_DEVEL_VERSION ROCM_SDK_LIBRARIES_VERSION; do
            printf '%s=%s\n' "$k" "${!k}" >> "$GITHUB_ENV"
          done
      - uses: docker/setup-buildx-action@v3
      - name: Build & push droste-comfyui-halo
        uses: docker/build-push-action@v6
        with:
          context: targets/comfyui
          file: targets/Container.comfyui
          push: true
          tags: |
            ${{ env.NS }}/droste-comfyui-halo:${{ github.sha }}
            ${{ env.NS }}/droste-comfyui-halo:latest
          build-args: |
            BASE_IMAGE=${{ env.NS }}/droste-torch-base-halo:${{ github.sha }}
            ROCM_INDEX_URL=${{ env.ROCM_INDEX_URL }}
            TORCH_VERSION=${{ env.TORCH_VERSION }}
            TORCHVISION_VERSION=${{ env.TORCHVISION_VERSION }}
            TORCHAUDIO_VERSION=${{ env.TORCHAUDIO_VERSION }}
          cache-from: type=registry,ref=${{ env.NS }}/droste-comfyui-halo:buildcache
          cache-to: type=registry,ref=${{ env.NS }}/droste-comfyui-halo:buildcache,mode=max
