# distrobox.ini — droste-comfyui-halo, distrobox-lane example.
# Create with:   distrobox assemble create --file distrobox.ini
# (remote inis work too: distrobox assemble create --file <URL>)
#
# UNIFIED LANE: init_hooks runs the shared resolver IN the box on every
# container start, giving distrobox the same mount treatment as the server
# lane. In-container it mounts the venv + custom_nodes overlays (uppers on
# /opt/data — pip and custom-node installs survive box recreation), surfaces
# model-tree and user/ from /opt/data over /opt/ComfyUI/{models,user}, and
# binds the compute caches (/opt/data/cache/* over ~/.cache/* etc.). The
# /opt/data filesystem rule + fallback chain (kernel overlay → fuse-overlayfs
# → copy) applies exactly as in the server lane. The host home is auto-bound,
# so the shared HF cache (~/.cache/huggingface) persists natively and is
# deliberately NOT resolver-mounted. The hook also verifies the CRITICAL
# binds below, seeds templates (demo inputs, UI workflows,
# extra_model_paths.yaml), writes the /opt/models notice, and refreshes the
# model symlink tree on /opt/data. Binds kept in this ini = data +
# input/output (+ optional models) ONLY — everything else is mounted
# in-container by the init hook.
#
# EDIT the host-side (left) paths; create the host dirs first. Absolute paths
# are safest if your distrobox version does not expand ~.

[droste-comfyui]
image=ghcr.io/doctorjei/droste-comfyui-halo:latest
init_hooks="/opt/resources/resolve/droste-init-hook.sh"
# In-box mounting needs CAP_SYS_ADMIN (+ /dev/fuse for the fuse-overlayfs
# fallback). `additional_flags` is the documented distrobox-assemble key for
# extra container-manager flags (string_list, space-separated — same value as
# `distrobox create --additional-flags`).
additional_flags="--cap-add sys_admin --device /dev/fuse"
# /opt/data = container-specific state (model tree/registry, seeded config,
# custom-node + venv uppers); input/output = CRITICAL work dirs (the resolver
# refuses to proceed unless bound — ALLOW_EPHEMERAL=1 escapes).
# Shared compute caches across ALL droste boxes are appended below (optional — remove to keep caches per-box).
volume="~/droste/comfyui/data:/opt/data ~/droste/comfyui/input:/opt/ComfyUI/input ~/droste/comfyui/output:/opt/ComfyUI/output ~/droste/caches:/opt/caches"
# Optional read-only local model collection (scanner source #2): to enable, APPEND
#   ~/models:/opt/models:ro
# (space-separated) INSIDE the single volume= value above — do NOT add a second volume= line
# (distrobox reads only the LAST volume= key, so a second line silently drops the others).
