# distrobox.ini — droste-comfyui-halo, distrobox-lane example.
# Create with:   distrobox assemble create --file distrobox.ini
# (remote inis work too: distrobox assemble create --file <URL>)
#
# distrobox is the $HOME-native interactive lane: the host home is bound
# automatically, so the shared HF cache (~/.cache/huggingface) already
# persists — only non-$HOME paths need volume= binds. init_hooks runs the
# shared resolver in distrobox mode on every cold start: no internal mounts,
# but it verifies the CRITICAL binds below, seeds templates (demo inputs,
# UI workflows, extra_model_paths.yaml), writes the /opt/models notice, and
# refreshes the model symlink tree (on /opt/data) from the HF cache. The tree
# reaches /opt/ComfyUI/models only via the volume= bind below — in this lane
# the ini carries the server lane's SURFACES.
#
# EDIT the host-side (left) paths; create the host dirs first. Absolute paths
# are safest if your distrobox version does not expand ~.

[droste-comfyui]
image=ghcr.io/doctorjei/droste-comfyui-halo:latest
init_hooks="/opt/resources/resolve/droste-init-hook.sh"
# /opt/data = container-specific state (model tree/registry, seeded config,
# custom-node + venv uppers); input/output = CRITICAL work dirs (the resolver
# refuses to proceed unless bound — ALLOW_EPHEMERAL=1 escapes).
volume="~/droste/comfyui/data:/opt/data ~/droste/comfyui/input:/opt/ComfyUI/input ~/droste/comfyui/output:/opt/ComfyUI/output"
# Server-lane SURFACES, mirrored here because the resolver mounts nothing in
# distrobox: model-tree = the scanner's symlink tree (the init hook populates
# it through the /opt/data bind), user/ = ComfyUI state (db/settings/
# workflows). MUST stay in sync with the /opt/data host dir above; podman
# creates missing host dirs.
volume="~/droste/comfyui/data/model-tree:/opt/ComfyUI/models ~/droste/comfyui/data/user:/opt/ComfyUI/user"
# Optional read-only local model collection (scanner source #2):
#volume="~/models:/opt/models:ro"
