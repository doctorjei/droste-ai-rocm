# distrobox.ini — droste-ds4-halo, distrobox-lane example.
# Create with:   distrobox assemble create --file distrobox.ini
# (remote inis work too: distrobox assemble create --file <URL>)
#
# UNIFIED LANE: init_hooks runs the shared resolver IN the box on every
# container start, giving distrobox the same mount treatment as the server
# lane. In-container it mounts the venv overlay (upper on /opt/data — your
# pip installs survive box recreation; kernel overlay → fuse-overlayfs → copy
# fallback chain, /opt/data filesystem rule applies) and surfaces ~/.ds4 from
# /opt/data/ds4 — saved sessions land on the data volume (and survive box
# recreation) instead of the raw home dir. The host home is auto-bound, so
# the shared HF cache (~/.cache/huggingface) — where download_model.sh
# fetches the 80-430 GB quants, CRITICAL — persists natively and is
# deliberately NOT resolver-mounted. The hook also verifies that critical,
# seeds /opt/data/ds4.env (a flag reference; the DS4_DROSTE_* translation
# only takes effect in the server lane — nothing is exec'd here — and the
# cockpit symlink stays server-lane-only: cockpit state rides the host home
# natively), and writes the /opt/models notice. Binds kept in this ini =
# data (+ optional models) ONLY. Serve interactively with plain flags:
#   ds4-server -m <model>.gguf --host 0.0.0.0 --port 8000   (or ds4-cockpit)
#
# EDIT the host-side (left) paths; create the host dirs first. Absolute paths
# are safest if your distrobox version does not expand ~.

[droste-ds4]
image=ghcr.io/doctorjei/droste-ds4-halo:latest
init_hooks="/opt/resources/resolve/droste-init-hook.sh"
# In-box mounting needs CAP_SYS_ADMIN (+ /dev/fuse for the fuse-overlayfs
# fallback). `additional_flags` is the documented distrobox-assemble key for
# extra container-manager flags (string_list, space-separated).
additional_flags="--cap-add sys_admin --device /dev/fuse"
# /opt/data = container-specific state (the persisted ds4.env + kv-disk + ds4 sessions + venv upper).
volume="~/droste/ds4/data:/opt/data"
# Shared compute caches across ALL droste boxes (optional — remove to keep caches per-box):
volume="~/droste/caches:/opt/caches"
# Optional read-only local GGUF collection (DS4_DROSTE_MODEL may point here):
#volume="~/models:/opt/models:ro"
