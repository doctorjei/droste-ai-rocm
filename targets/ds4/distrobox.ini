# distrobox.ini — droste-ds4-halo, distrobox-lane example.
# Create with:   distrobox assemble create --file distrobox.ini
# (remote inis work too: distrobox assemble create --file <URL>)
#
# distrobox is the $HOME-native interactive lane: the host home is bound
# automatically, so the shared HF cache (~/.cache/huggingface) — where
# download_model.sh fetches the 80-430 GB quants, CRITICAL — already persists,
# and ds4 session state (~/.ds4) rides the host home natively. init_hooks runs
# the shared resolver in distrobox mode on every cold start: no internal
# mounts, but it verifies the HF-cache bind, seeds /opt/data/ds4.env (a flag
# reference; the DS4_DROSTE_* translation only takes effect in the server lane —
# nothing is exec'd here — and the cockpit symlink is server-lane-only: cockpit
# state rides the host home natively), and writes the /opt/models notice.
# Serve interactively with plain flags:
#   ds4-server -m <model>.gguf --host 0.0.0.0 --port 8000   (or ds4-cockpit)
#
# EDIT the host-side (left) paths; create the host dirs first. Absolute paths
# are safest if your distrobox version does not expand ~.

[droste-ds4]
image=ghcr.io/doctorjei/droste-ds4-halo:latest
init_hooks="/opt/resources/resolve/droste-init-hook.sh"
# /opt/data = container-specific state (the persisted ds4.env + kv-disk cache + venv upper).
volume="~/droste/ds4/data:/opt/data"
# Optional read-only local GGUF collection (DS4_DROSTE_MODEL may point here):
#volume="~/models:/opt/models:ro"
