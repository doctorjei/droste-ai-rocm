# distrobox.ini — droste-finetuning-halo, distrobox-lane example.
# Create with:   distrobox assemble create --file distrobox.ini
# (remote inis work too: distrobox assemble create --file <URL>)
#
# distrobox is the $HOME-native interactive lane: the host home is bound
# automatically, so the shared HF cache (~/.cache/huggingface) already
# persists. init_hooks runs the shared resolver in distrobox mode on every
# cold start: no internal mounts, but it verifies the CRITICAL binds below
# and seeds the starter notebooks into an EMPTY workspace.
#
# EDIT the host-side (left) paths; create the host dirs first. Absolute paths
# are safest if your distrobox version does not expand ~.

[droste-finetuning]
image=ghcr.io/doctorjei/droste-finetuning-halo:latest
init_hooks="/opt/resources/resolve/droste-init-hook.sh"
# workspace = CRITICAL (edited notebooks + trained adapters live there — the
# resolver refuses to proceed unless bound; ALLOW_EPHEMERAL=1 escapes).
# /opt/data = container-specific state (venv upper, compute caches in the
# server lane; harmless but recommended here for consistency).
volume="~/droste/finetuning/workspace:/opt/workspace ~/droste/finetuning/data:/opt/data"
