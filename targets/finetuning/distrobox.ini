# distrobox.ini — droste-finetuning-halo, distrobox-lane example.
# Create with:   distrobox assemble create --file distrobox.ini
# (remote inis work too: distrobox assemble create --file <URL>)
#
# UNIFIED LANE: init_hooks runs the shared resolver IN the box on every
# container start, giving distrobox the same mount treatment as the server
# lane. In-container it mounts the venv overlay (upper on /opt/data — your
# pip installs survive box recreation; kernel overlay → fuse-overlayfs → copy
# fallback chain, /opt/data filesystem rule applies) and binds the compute
# caches (/opt/data/cache/{miopen,miopen-db,triton,torch} over their ~/.
# paths, so box-specific kernel caches live with the box's data instead of
# leaking into the real home). The host home is auto-bound, so the shared HF
# cache (~/.cache/huggingface, CRITICAL) persists natively and is
# deliberately NOT resolver-mounted. The hook also verifies the CRITICAL
# binds below and seeds the starter notebooks into an EMPTY workspace. Binds
# kept in this ini = workspace + data ONLY.
#
# EDIT the host-side (left) paths; create the host dirs first. Absolute paths
# are safest if your distrobox version does not expand ~.

[droste-finetuning]
image=ghcr.io/doctorjei/droste-finetuning-halo:latest
init_hooks="/opt/resources/resolve/droste-init-hook.sh"
# In-box mounting needs CAP_SYS_ADMIN (+ /dev/fuse for the fuse-overlayfs
# fallback). `additional_flags` is the documented distrobox-assemble key for
# extra container-manager flags (string_list, space-separated).
additional_flags="--cap-add sys_admin --device /dev/fuse"
# workspace = CRITICAL (edited notebooks + trained adapters live there — the
# resolver refuses to proceed unless bound; ALLOW_EPHEMERAL=1 escapes).
# /opt/data = container-specific state (venv upper + compute caches, BOTH
# lanes since lane unification).
# Shared compute caches across ALL droste boxes are appended below (optional — remove to keep caches per-box).
volume="~/droste/finetuning/workspace:/opt/workspace ~/droste/finetuning/data:/opt/data ~/droste/caches:/opt/caches"
