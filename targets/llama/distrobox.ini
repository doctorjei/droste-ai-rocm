# distrobox.ini — droste-llama-halo, distrobox-lane example.
# Create with:   distrobox assemble create --file distrobox.ini
# (remote inis work too: distrobox assemble create --file <URL>)
#
# distrobox is the $HOME-native interactive lane: the host home is bound
# automatically, so the shared HF cache (~/.cache/huggingface) — where -hf
# downloads land, CRITICAL — already persists. init_hooks runs the shared
# resolver in distrobox mode on every cold start: no internal mounts, but it
# verifies the HF-cache bind, seeds /opt/data/llama.env (edit it, set
# LLAMA_ARG_MODEL), and writes the /opt/models notice. Serve with:
#   set -a; . /opt/data/llama.env; set +a; llama-server $LLAMA_EXTRA_ARGS
#
# EDIT the host-side (left) paths; create the host dirs first. Absolute paths
# are safest if your distrobox version does not expand ~.

[droste-llama]
image=ghcr.io/doctorjei/droste-llama-halo:latest
init_hooks="/opt/resources/resolve/droste-init-hook.sh"
# /opt/data = container-specific state (the persisted llama.env + slot store + venv upper).
volume="~/droste/llama/data:/opt/data"
# Optional read-only local GGUF collection (LLAMA_ARG_MODEL may point here):
#volume="~/models:/opt/models:ro"
