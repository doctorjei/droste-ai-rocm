# distrobox.ini — droste-vllm-halo, distrobox-lane example.
# Create with:   distrobox assemble create --file distrobox.ini
# (remote inis work too: distrobox assemble create --file <URL>)
#
# UNIFIED LANE: init_hooks runs the shared resolver IN the box on every
# container start, giving distrobox the same mount treatment as the server
# lane. In-container it mounts the venv overlay (upper on /opt/data — your
# pip installs survive box recreation; kernel overlay → fuse-overlayfs → copy
# fallback chain, /opt/data filesystem rule applies) and binds the compute
# caches (/opt/data/cache/{miopen,miopen-db,triton,vllm} over their ~/. paths,
# so box-specific kernel caches live with the box's data instead of leaking
# into the real home). The host home is auto-bound, so the shared HF cache
# (~/.cache/huggingface) — vLLM's model store, CRITICAL — persists natively
# and is deliberately NOT resolver-mounted. The hook also verifies that
# critical, seeds /opt/data/vllm_config.yaml (edit it, set `model:`), and
# writes the /opt/models notice. Binds kept in this ini = data (+ optional
# models) ONLY. Serve with:
#   vllm serve --config /opt/data/vllm_config.yaml
#
# EDIT the host-side (left) paths; create the host dirs first. Absolute paths
# are safest if your distrobox version does not expand ~.

[droste-vllm]
image=ghcr.io/doctorjei/droste-vllm-halo:latest
init_hooks="/opt/resources/resolve/droste-init-hook.sh"
# In-box mounting needs CAP_SYS_ADMIN (+ /dev/fuse for the fuse-overlayfs
# fallback). `additional_flags` is the documented distrobox-assemble key for
# extra container-manager flags (string_list, space-separated).
additional_flags="--cap-add sys_admin --device /dev/fuse"
# /opt/data = container-specific state (the persisted vllm_config.yaml + venv upper + caches).
# Shared compute caches across ALL droste boxes are appended below (optional — remove to keep caches per-box).
volume="~/droste/vllm/data:/opt/data ~/droste/caches:/opt/caches"
# Optional read-only local model collection (config `model:` may point here): to enable, APPEND
#   ~/models:/opt/models:ro
# (space-separated) INSIDE the single volume= value above — do NOT add a second volume= line
# (distrobox reads only the LAST volume= key, so a second line silently drops the others).
