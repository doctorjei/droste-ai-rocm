# distrobox.ini — droste-vllm-halo, distrobox-lane example.
# Create with:   distrobox assemble create --file distrobox.ini
# (remote inis work too: distrobox assemble create --file <URL>)
#
# distrobox is the $HOME-native interactive lane: the host home is bound
# automatically, so the shared HF cache (~/.cache/huggingface) — vLLM's model
# store, CRITICAL — already persists. init_hooks runs the shared resolver in
# distrobox mode on every cold start: no internal mounts, but it verifies the
# HF-cache bind, seeds /opt/data/vllm_config.yaml (edit it, set `model:`),
# and writes the /opt/models notice. Serve with:
#   vllm serve --config /opt/data/vllm_config.yaml
#
# EDIT the host-side (left) paths; create the host dirs first. Absolute paths
# are safest if your distrobox version does not expand ~.

[droste-vllm]
image=ghcr.io/doctorjei/droste-vllm-halo:latest
init_hooks="/opt/resources/resolve/droste-init-hook.sh"
# /opt/data = container-specific state (the persisted vllm_config.yaml + venv upper).
volume="~/droste/vllm/data:/opt/data"
# Optional read-only local model collection (config `model:` may point here):
#volume="~/models:/opt/models:ro"
